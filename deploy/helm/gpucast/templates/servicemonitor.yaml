{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gpucast
  labels:
    app.kubernetes.io/name: gpucast
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpucast
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
