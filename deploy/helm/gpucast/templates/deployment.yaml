apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpucast
  labels:
    app.kubernetes.io/name: gpucast
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gpucast
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpucast
    spec:
      containers:
        - name: gpucast
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --listen=:{{ .Values.service.port }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gpucast
  labels:
    app.kubernetes.io/name: gpucast
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.service.port }}"
spec:
  selector:
    app.kubernetes.io/name: gpucast
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: metrics
