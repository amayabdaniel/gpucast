apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gpucast
  labels:
    app.kubernetes.io/name: gpucast
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gpucast
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only allow Prometheus to scrape metrics
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # Allow scraping vLLM/Triton metrics endpoints
    - to: []
      ports:
        - port: 8000
          protocol: TCP
        - port: 8001
          protocol: TCP
        - port: 8002
          protocol: TCP
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
